<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mac Remote Control</title>
    
    <!-- iOS Add to Home Screen Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mac Remote">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <span class="logo-icon">✦</span>
                <h1>Mac Remote</h1>
            </div>
            <div class="header-actions">
                <div id="connection-status" class="status disconnected">
                    <span class="status-dot"></span>
                    <span class="status-text">Connecting...</span>
                </div>
                <button id="btn-settings" class="icon-btn" aria-label="Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </header>

        <!-- Tab Switcher -->
        <div class="tab-switcher">
            <button id="tab-trackpad" class="tab-btn active" data-target="panel-trackpad">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tab-icon"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="12" x2="21" y2="12"></line></svg>
                Trackpad
            </button>
            <button id="tab-media" class="tab-btn" data-target="panel-media">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tab-icon"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
                Media Player
            </button>
        </div>

        <main>
            <!-- Trackpad Panel -->
            <div id="panel-trackpad" class="panel active">
                <div class="trackpad-wrapper">
                    <div id="trackpad" class="trackpad">
                        <div class="trackpad-grid"></div>
                        <div class="trackpad-hint">Swipe to move cursor • Tap to click • Two fingers to scroll</div>
                        
                        <!-- Floating Keyboard Indicator -->
                        <div id="keyboard-trigger" class="keyboard-trigger-bar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="kbd-icon"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><line x1="6" y1="8" x2="6" y2="8"></line><line x1="10" y1="8" x2="10" y2="8"></line><line x1="14" y1="8" x2="14" y2="8"></line><line x1="18" y1="8" x2="18" y2="8"></line><line x1="6" y1="12" x2="6" y2="12"></line><line x1="10" y1="12" x2="10" y2="12"></line><line x1="14" y1="12" x2="14" y2="12"></line><line x1="18" y1="12" x2="18" y2="12"></line><line x1="7" y1="16" x2="17" y2="16"></line></svg>
                            <span>Tap to Type</span>
                        </div>
                    </div>
                    <div id="scroll-zone" class="scroll-zone">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="scroll-arrow"><polyline points="17 11 12 6 7 11"></polyline><polyline points="17 13 12 18 7 13"></polyline></svg>
                        <div class="scroll-label">Scroll</div>
                    </div>
                </div>

                <div class="control-panel">
                    <div class="mouse-buttons">
                        <button id="btn-left-click" class="btn btn-mouse" aria-label="Left Click">
                            <span class="click-indicator left"></span>
                        </button>
                        <button id="btn-right-click" class="btn btn-mouse" aria-label="Right Click">
                            <span class="click-indicator right"></span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Media Player Panel -->
            <div id="panel-media" class="panel">
                <div class="media-container">
                    <div class="playback-controls">
                        <button id="media-prev" class="btn media-btn" aria-label="Previous Track">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
                        </button>
                        <button id="media-play" class="btn media-btn play-btn" aria-label="Play Pause">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 4 12 12 3 20 3 4"></polygon><line x1="17" y1="5" x2="17" y2="19"></line><line x1="21" y1="5" x2="21" y2="19"></line></svg>
                        </button>
                        <button id="media-next" class="btn media-btn" aria-label="Next Track">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
                        </button>
                    </div>
                    
                    <div class="volume-controls">
                        <button id="media-voldown" class="btn media-btn volume-btn" aria-label="Volume Down">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        </button>
                        <button id="media-mute" class="btn media-btn volume-btn" aria-label="Mute">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                        </button>
                        <button id="media-volup" class="btn media-btn volume-btn" aria-label="Volume Up">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        </button>
                    </div>

                    <!-- Navigation D-Pad -->
                    <div class="dpad-container">
                        <div class="dpad">
                            <button id="nav-up" class="btn dpad-btn" aria-label="Up Arrow" style="grid-area: up;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                            </button>
                            <button id="nav-left" class="btn dpad-btn" aria-label="Left Arrow" style="grid-area: left;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                            </button>
                            <button id="nav-enter" class="btn dpad-btn dpad-enter" aria-label="Select/Enter" style="grid-area: enter;">
                                <span>OK</span>
                            </button>
                            <button id="nav-right" class="btn dpad-btn" aria-label="Right Arrow" style="grid-area: right;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            </button>
                            <button id="nav-down" class="btn dpad-btn" aria-label="Down Arrow" style="grid-area: down;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="modal-settings" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="btn-close-settings" class="icon-btn close-btn" aria-label="Close Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <!-- Theme Selection Setting -->
                <div class="setting-item">
                    <div class="setting-info">
                        <h3>Interface Theme</h3>
                        <p>Choose between dark and light appearance modes</p>
                    </div>
                    <div class="theme-switcher">
                        <button id="btn-theme-dark" class="theme-btn active" data-theme="dark">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                            Dark
                        </button>
                        <button id="btn-theme-light" class="theme-btn" data-theme="light">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                            Light
                        </button>
                    </div>
                </div>

                <!-- Sensitivity Setting -->
                <div class="setting-item">
                    <div class="setting-info">
                        <h3>Cursor Sensitivity</h3>
                        <p>Adjust cursor movement speed multiplier</p>
                    </div>
                    <div class="sensitivity-control">
                        <label for="slider-sensitivity">
                            <span>Sensitivity Multiplier</span>
                            <span id="val-sensitivity">2.0x</span>
                        </label>
                        <input type="range" id="slider-sensitivity" min="0.5" max="4.0" step="0.1" value="2.0">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden input to capture soft keyboard text -->
    <input type="text" id="hidden-keyboard" class="hidden-input" autocomplete="off" autocapitalize="off" spellcheck="false">

    <script src="app.js"></script>
</body>
</html>
